################################################################
# Window rules
################################################################

# Steam: launcher window small, big-picture full
windowrulev2 = float,           class:^(steam)$, title:^(Friends List)$
windowrulev2 = float,           class:^(steam)$, title:^(.*Settings.*)$
windowrulev2 = workspace 4,     class:^(steam)$
windowrulev2 = workspace 4,     class:^(steamwebhelper)$

# Discord / Vesktop
windowrulev2 = workspace 3,     class:^(vesktop|discord|Discord|discord-canary)$
windowrulev2 = idleinhibit fullscreen, class:^(vesktop|discord)$

# Browsers default to workspace 2
windowrulev2 = workspace 2,     class:^(firefox)$
windowrulev2 = workspace 2,     class:^(brave-browser|vivaldi-stable|librewolf)$

# Games: float + idle inhibit + immediate
windowrulev2 = float,           class:^(gw2-64)$, title:^(Guild Wars 2)$
windowrulev2 = immediate,       class:^(gw2-64|hl2_linux|cs2|cyberpunk2077)$
windowrulev2 = idleinhibit always, class:^(gw2-64|hl2_linux|cs2)$
windowrulev2 = workspace 5,     class:^(gw2-64|hl2_linux|cs2)$

# Picture-in-picture pop-outs (Firefox / Brave / mpv) — always on top, sticky
windowrulev2 = float,           title:^(Picture-in-Picture)$
windowrulev2 = pin,             title:^(Picture-in-Picture)$
windowrulev2 = move 100%-w-20 60, title:^(Picture-in-Picture)$
windowrulev2 = size 480 270,    title:^(Picture-in-Picture)$

# File dialogs / pop-ups should float
windowrulev2 = float, class:^(file_progress)$
windowrulev2 = float, class:^(confirm)$
windowrulev2 = float, class:^(dialog)$
windowrulev2 = float, class:^(download)$
windowrulev2 = float, class:^(notification)$
windowrulev2 = float, class:^(error)$
windowrulev2 = float, class:^(splash)$
windowrulev2 = float, class:^(confirmreset)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(Library)$

# Pavucontrol
windowrulev2 = float,        class:^(pavucontrol|org.pulseaudio.pavucontrol)$
windowrulev2 = size 600 460, class:^(pavucontrol|org.pulseaudio.pavucontrol)$

# NetworkManager
windowrulev2 = float, class:^(nm-connection-editor|nm-applet)$

# KeePassXC unlock dialog
windowrulev2 = float, class:^(org.keepassxc.KeePassXC)$, title:^(Unlock Database.*)$

# Floating helpers (always float these by class)
windowrulev2 = float, class:^(galculator|wcalc|kcalc|gpick)$
