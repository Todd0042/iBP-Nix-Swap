################################################################
# Monitor layout — derived from current KDE arrangement.
#
#   +---------------+----------------------+---------------+
#   |  DP-3 1080p   |     DP-1 1440p 180Hz |  DP-2 1080p   |
#   |  (0,0)        |     (1920,0) PRIMARY |  (4480,0)     |
#   |               +--+----------------+--+               |
#   |               |   HDMI-A-1 1080p     |               |
#   |               |   (2229,1440)        |               |
#   +---------------+----------------------+---------------+
#
# Workspaces fan out across the 4 monitors (see keybinds.conf).
################################################################

monitor = DP-1,    2560x1440@180, 1920x0,    1                # PRIMARY (LG)
monitor = DP-3,    1920x1080@60,  0x0,       1                # LEFT (ONN)
monitor = DP-2,    1920x1080@60,  4480x0,    1                # RIGHT (Vizio)
monitor = HDMI-A-1,1920x1080@60,  2229x1440, 1                # BOTTOM (ONN)

# Fallback for anything we plug in later
monitor = ,preferred,auto,1

# Workspace → monitor binding (1-5 primary, 6-7 left, 8-9 right, 10 bottom)
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-3, default:true
workspace = 7, monitor:DP-3
workspace = 8, monitor:DP-2, default:true
workspace = 9, monitor:DP-2
workspace = 10, monitor:HDMI-A-1, default:true
