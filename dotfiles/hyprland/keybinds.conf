################################################################
# Keybinds
#  Super = $mainMod (Windows key)
################################################################
$mainMod = SUPER
$term    = kitty
$browser = firefox
$files   = dolphin
$menu    = wofi --show drun
$power   = wofi --show drun -- powermenu

# ── App launchers ───────────────────────────────────────────────
# Primary launch keys (per user request):
bind = ALT,      RETURN, exec, $files       # Alt + Enter   = file manager
bind = ALT,      ESCAPE, exec, $term        # Alt + Escape  = terminal
# Secondary launchers via Super:
bind = $mainMod, RETURN, exec, $term
bind = $mainMod, B,      exec, $browser
bind = $mainMod, E,      exec, $files
bind = $mainMod, D,      exec, $menu
bind = $mainMod SHIFT, D, exec, rofi -show drun -theme ~/.config/rofi/config.rasi
# Toggle the keybind overlay any time:
bind = $mainMod, F1,     exec, pkill -SIGUSR1 -f binds-overlay.py || python3 ~/.config/hypr/binds-overlay.py &

# ── Window management ──────────────────────────────────────────
bind = $mainMod,        Q, killactive
bind = $mainMod SHIFT,  Q, exit                     # quit Hyprland session
bind = $mainMod,        F, fullscreen, 0
bind = $mainMod SHIFT,  F, fullscreen, 1            # maximize (keep bars)
bind = $mainMod,        V, togglefloating
bind = $mainMod,        P, pseudo
bind = $mainMod,        J, togglesplit
bind = $mainMod,        L, exec, swaylock -f

# ── Focus (vim-style) ──────────────────────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ── Move window ────────────────────────────────────────────────
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# ── Resize (10px steps) ────────────────────────────────────────
bind = $mainMod CTRL, H, resizeactive, -40 0
bind = $mainMod CTRL, L, resizeactive,  40 0
bind = $mainMod CTRL, K, resizeactive, 0 -40
bind = $mainMod CTRL, J, resizeactive, 0  40

# ── Workspaces (Super+1..0) ─────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Cycle workspaces on current monitor
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── Move focus between monitors ────────────────────────────────
bind = $mainMod, left,  focusmonitor, l
bind = $mainMod, right, focusmonitor, r
bind = $mainMod, up,    focusmonitor, u
bind = $mainMod, down,  focusmonitor, d

# ── Drag windows with mouse ────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Media / brightness keys ────────────────────────────────────
bindel = ,XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = ,XF86AudioLowerVolume, exec, pamixer -d 5
bindl  = ,XF86AudioMute,        exec, pamixer -t
bindl  = ,XF86AudioMicMute,     exec, pamixer --default-source -t
bindl  = ,XF86AudioPlay,        exec, playerctl play-pause
bindl  = ,XF86AudioNext,        exec, playerctl next
bindl  = ,XF86AudioPrev,        exec, playerctl previous
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Screenshot (region | window | full) ────────────────────────
bind =        , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim -g "$(slurp -w 1)" ~/Pictures/screenshot-$(date +%F_%H%M%S).png
bind = SHIFT, Print, exec, grim ~/Pictures/screenshot-$(date +%F_%H%M%S).png

# ── Reload config without logout ───────────────────────────────
bind = $mainMod SHIFT, R, exec, hyprctl reload
