################################################################
# Autostart
################################################################

# Polkit agent (KDE one is the most mature)
exec-once = /run/current-system/sw/libexec/polkit-kde-authentication-agent-1

# Wallpaper daemon + apply
exec-once = swww-daemon
exec-once = sh -c 'sleep 1 && swww img /etc/xdg/wallpapers/wall-1.png --transition-type fade --transition-duration 1.5'

# Bar
exec-once = waybar

# Notifications
exec-once = mako

# Clipboard history
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# NetworkManager applet (some apps still look for it on the SNI bus)
exec-once = nm-applet --indicator

# Tray apps — launched via wait-tray-then-exec so they don't race waybar
exec-once = wait-tray-then-exec vesktop --start-minimized
exec-once = wait-tray-then-exec keepassxc
exec-once = wait-tray-then-exec qbittorrent

# Always-visible keybind overlay (reads `hyprctl binds -j` live, so any
# change you make to keybinds.conf shows up on next refresh, no edit needed).
# Super+F1 toggles it.
exec-once = python3 ~/.config/hypr/binds-overlay.py

# Idle: dim → lock → DPMS
exec-once = swayidle -w \
    timeout 600 'swaylock -f' \
    timeout 900 'hyprctl dispatch dpms off' \
        resume  'hyprctl dispatch dpms on'  \
    before-sleep 'swaylock -f'
