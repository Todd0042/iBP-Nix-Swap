################################################################
# iBP Hyprland config — top-level
# Edit any of the sourced files and run:   hyprctl reload
################################################################

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/autostart.conf

################################################################
# INPUT
################################################################
input {
    kb_layout       = us
    follow_mouse    = 1
    sensitivity     = 0
    repeat_rate     = 40
    repeat_delay    = 280
    accel_profile   = flat

    touchpad {
        natural_scroll = true
    }
}

################################################################
# GENERAL
################################################################
general {
    gaps_in              = 4
    gaps_out             = 8
    border_size          = 2
    col.active_border    = rgba(81a1c1ff) rgba(88c0d0ff) 45deg
    col.inactive_border  = rgba(2e3440aa)
    layout               = dwindle
    allow_tearing        = true   # screen-tear-free vsync override for gaming
}

################################################################
# DECORATION
################################################################
decoration {
    rounding = 6
    active_opacity   = 1.0
    inactive_opacity = 0.95

    blur {
        enabled        = true
        size           = 3
        passes         = 2
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range   = 12
        render_power = 3
        color   = rgba(00000055)
    }
}

################################################################
# ANIMATIONS — snappy, not flashy
################################################################
animations {
    enabled = true
    bezier  = ease, 0.16, 1, 0.3, 1
    animation = windows,   1, 4, ease
    animation = border,    1, 5, default
    animation = fade,      1, 4, default
    animation = workspaces, 1, 4, ease
}

################################################################
# LAYOUT
################################################################
dwindle {
    pseudotile     = yes
    preserve_split = yes
    smart_split    = false
    smart_resize   = true
}

master {
    new_status = master
}

################################################################
# MISC
################################################################
misc {
    disable_hyprland_logo     = true
    disable_splash_rendering  = true
    force_default_wallpaper   = 0
    vfr                       = true
    vrr                       = 1   # variable refresh on supported monitors
    enable_swallow            = true
    swallow_regex             = ^(kitty|alacritty|foot)$
    focus_on_activate         = true
    mouse_move_enables_dpms   = true
}

################################################################
# CURSOR / XWAYLAND
################################################################
cursor {
    no_hardware_cursors = true
}

xwayland {
    force_zero_scaling = true
}
