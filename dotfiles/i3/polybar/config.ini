; iBP polybar — Nord palette, one bar per monitor.

[colors]
background      = #ee2e3440
background-alt  = #3b4252
foreground      = #eceff4
foreground-alt  = #4c566a
primary         = #88c0d0
secondary       = #81a1c1
alert           = #bf616a
good            = #a3be8c
warn            = #ebcb8b

[bar/base]
width           = 100%
height          = 28
fixed-center    = true
background      = ${colors.background}
foreground      = ${colors.foreground}
line-size       = 2
border-size     = 0
padding-left    = 1
padding-right   = 1
module-margin   = 1
font-0          = "Ubuntu Sans Nerd Font:size=10;2"
font-1          = "JetBrainsMono Nerd Font:size=10;2"
font-2          = "Font Awesome 6 Free:style=Solid:size=10;2"
cursor-click    = pointer
cursor-scroll   = ns-resize
wm-restack      = i3
enable-ipc      = true
tray-position   = right
tray-padding    = 4
tray-maxsize    = 18
tray-background = ${colors.background}

[bar/primary]
inherit         = bar/base
monitor         = DP-1
modules-left    = i3 title
modules-center  = date
modules-right   = pulseaudio cpu memory temperature gpu network powermenu

[bar/left]
inherit         = bar/base
monitor         = DP-3
tray-position   =
modules-left    = i3
modules-center  = title
modules-right   = date

[bar/right]
inherit         = bar/base
monitor         = DP-2
tray-position   =
modules-left    = i3
modules-center  = title
modules-right   = date

[bar/bottom]
inherit         = bar/base
monitor         = HDMI-A-1
tray-position   =
modules-left    = i3
modules-center  = title
modules-right   = date

; ─── modules ────────────────────────────────────────────────

[module/i3]
type            = internal/i3
format          = <label-state> <label-mode>
index-sort      = true
wrapping-scroll = false
pin-workspaces  = true
label-mode-padding = 2
label-mode-foreground = ${colors.background}
label-mode-background = ${colors.warn}

label-focused             = %index%
label-focused-background  = ${colors.background-alt}
label-focused-underline   = ${colors.primary}
label-focused-padding     = 1

label-unfocused           = %index%
label-unfocused-padding   = 1

label-visible             = %index%
label-visible-padding     = 1

label-urgent              = %index%
label-urgent-foreground   = ${colors.alert}
label-urgent-padding      = 1

[module/title]
type            = internal/xwindow
format          = <label>
format-padding  = 0
label           = %title:0:70:…%
label-foreground = ${colors.foreground-alt}

[module/date]
type            = internal/date
interval        = 1
date            = %a %b %d
time            = %I:%M %p
label           = %date%   %time%
label-foreground = ${colors.foreground}
format-prefix   = " "
format-prefix-foreground = ${colors.primary}

[module/cpu]
type            = internal/cpu
interval        = 2
format-prefix   = " "
format-prefix-foreground = ${colors.primary}
label           = %percentage:2%%

[module/memory]
type            = internal/memory
interval        = 2
format-prefix   = " "
format-prefix-foreground = ${colors.primary}
label           = %gb_used%

[module/temperature]
type            = internal/temperature
interval        = 2
thermal-zone    = 0
warn-temperature = 80
format-prefix   = " "
format-prefix-foreground = ${colors.primary}
label           = %temperature-c%
label-warn      = %temperature-c%
label-warn-foreground = ${colors.alert}

[module/gpu]
type            = custom/script
exec            = nvidia-smi --query-gpu=utilization.gpu,memory.used --format=csv,noheader,nounits | awk -F', ' '{printf "%d%%  %dM", $1, $2}'
interval        = 3
format-prefix   = "󰍛 "
format-prefix-foreground = ${colors.primary}

[module/pulseaudio]
type            = internal/pulseaudio
format-volume   = <ramp-volume> <label-volume>
label-muted     = "  muted"
label-muted-foreground = ${colors.foreground-alt}
ramp-volume-0   = ""
ramp-volume-1   = ""
ramp-volume-2   = ""
ramp-volume-foreground = ${colors.primary}
click-right     = pavucontrol

[module/network]
type            = internal/network
interface-type  = wired
interval        = 3
format-connected         = <label-connected>
format-connected-prefix  = " "
format-connected-prefix-foreground = ${colors.good}
label-connected = "%ifname%"
format-disconnected      = <label-disconnected>
format-disconnected-prefix = " "
format-disconnected-prefix-foreground = ${colors.alert}
label-disconnected      = "off"

[module/powermenu]
type            = custom/text
content         = " ⏻"
content-foreground = ${colors.alert}
click-left      = rofi -show p -modi p:rofi-power-menu -theme ~/.config/rofi/config.rasi || systemctl poweroff
