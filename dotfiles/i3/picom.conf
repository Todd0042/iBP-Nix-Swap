################################################################
# picom — compositor for i3
################################################################

backend            = "glx";
vsync              = true;
use-damage         = true;
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient   = true;
detect-client-leader = true;

# Rounded corners
corner-radius      = 6;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
];

# Shadows
shadow             = true;
shadow-radius      = 12;
shadow-opacity     = 0.55;
shadow-offset-x    = -8;
shadow-offset-y    = -8;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c",
];

# Opacity
inactive-opacity   = 0.95;
active-opacity     = 1.00;
frame-opacity      = 1.0;
inactive-opacity-override = false;
opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'mpv'",
    "100:class_g = 'Steam'",
    "100:fullscreen",
];

# Fading
fading             = true;
fade-in-step       = 0.06;
fade-out-step      = 0.06;
fade-delta         = 4;
fade-exclude = [
    "class_g = 'slop'",
];

# Misc
dbe                = false;
unredir-if-possible = true;
unredir-if-possible-exclude = [
    "class_g = 'Firefox' && argb",
];

wintypes:
{
    tooltip   = { fade = true; shadow = false; focus = true; opacity = 0.95; };
    dock      = { shadow = false; clip-shadow-above = true; };
    dnd       = { shadow = false; };
    popup_menu = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
